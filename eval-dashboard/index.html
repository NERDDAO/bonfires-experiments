<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eval Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222633;
    --border: #2a2e3d;
    --text: #e1e4ed;
    --text-dim: #8b90a0;
    --accent: #6c8cff;
    --green: #34d399;
    --red: #f87171;
    --orange: #fbbf24;
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: var(--text-dim); margin-bottom: 32px; font-size: 0.95rem; }

  /* Rubric banner */
  .rubric-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 32px;
  }
  .rubric-banner h2 { font-size: 1rem; color: var(--accent); margin-bottom: 12px; }
  .rubric-categories {
    display: flex; flex-wrap: wrap; gap: 12px;
  }
  .rubric-cat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    flex: 1 1 220px;
    min-width: 200px;
  }
  .rubric-cat-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
  .rubric-cat-weight { font-size: 0.75rem; color: var(--text-dim); }
  .rubric-cat-desc { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

  /* Card grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-repo { font-weight: 700; font-size: 1.05rem; word-break: break-word; }
  .card-meta { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 12px; }

  .badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 10px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .badge-completed { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-submitted { background: rgba(108,140,255,0.15); color: var(--accent); }
  .badge-running  { background: rgba(251,191,36,0.15); color: var(--orange); }
  .badge-failed   { background: rgba(248,113,113,0.15); color: var(--red); }

  .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .score-big {
    font-size: 2rem; font-weight: 800; line-height: 1;
  }
  .score-pass { color: var(--green); }
  .score-fail { color: var(--red); }
  .score-label { font-size: 0.75rem; color: var(--text-dim); }
  .score-verdict {
    font-size: 0.8rem; font-weight: 700;
    padding: 2px 8px; border-radius: 4px;
  }
  .verdict-pass { background: rgba(52,211,153,0.15); color: var(--green); }
  .verdict-fail { background: rgba(248,113,113,0.15); color: var(--red); }

  .cat-scores { margin-top: 14px; }
  .cat-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .cat-bar-label { font-size: 0.75rem; color: var(--text-dim); width: 110px; flex-shrink: 0; }
  .cat-bar-track {
    flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden;
  }
  .cat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .cat-bar-value { font-size: 0.75rem; font-weight: 600; width: 30px; text-align: right; }

  .card-desc {
    font-size: 0.82rem; color: var(--text-dim); margin-top: 14px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: none;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 40px 16px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-width: 900px;
    width: 100%;
    padding: 32px;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--text-dim);
    font-size: 1.5rem; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  .modal h2 { font-size: 1.3rem; margin-bottom: 4px; }
  .modal-repo-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
  .modal-repo-link:hover { text-decoration: underline; }

  .modal-section { margin-top: 24px; }
  .modal-section h3 {
    font-size: 0.9rem; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .info-grid {
    display: grid; grid-template-columns: 120px 1fr; gap: 6px 16px;
    font-size: 0.85rem;
  }
  .info-label { color: var(--text-dim); font-weight: 600; }

  .scores-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .score-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .score-card h4 { font-size: 0.85rem; margin-bottom: 10px; }

  .md-content {
    font-size: 0.85rem; line-height: 1.7; color: var(--text);
  }
  .md-content h1 { font-size: 1.2rem; margin: 20px 0 8px; }
  .md-content h2 { font-size: 1.05rem; margin: 18px 0 6px; color: var(--accent); }
  .md-content h3 { font-size: 0.95rem; margin: 14px 0 4px; }
  .md-content p { margin-bottom: 10px; }
  .md-content ul, .md-content ol { padding-left: 20px; margin-bottom: 10px; }
  .md-content li { margin-bottom: 4px; }
  .md-content code {
    background: var(--bg); padding: 2px 6px; border-radius: 4px;
    font-size: 0.82rem;
  }
  .md-content pre {
    background: var(--bg); padding: 14px; border-radius: 8px;
    overflow-x: auto; margin-bottom: 12px;
  }
  .md-content pre code { background: none; padding: 0; }
  .md-content strong { color: var(--text); }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .tab-bar { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 0.85rem; padding: 8px 16px; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .loading {
    text-align: center; padding: 60px 20px; color: var(--text-dim);
    font-size: 0.95rem;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .card-grid { grid-template-columns: 1fr; }
    .scores-grid { grid-template-columns: 1fr; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Agentic Evaluation Results</h1>
  <p class="subtitle">Project reviews — deduplicated, latest per repository</p>

  <div id="rubric-section"></div>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    Loading reviews...
  </div>
  <div id="card-grid" class="card-grid"></div>
</div>

<div id="modal-overlay" class="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const $ = (s, el) => (el || document).querySelector(s);
const $$ = (s, el) => [...(el || document).querySelectorAll(s)];

let reviews = [];
let rubrics = [];

function barColor(score) {
  if (score >= 75) return 'var(--green)';
  if (score >= 60) return 'var(--orange)';
  return 'var(--red)';
}

function repoName(url) {
  if (!url) return 'Unknown';
  const parts = url.replace(/\/+$/, '').split('/');
  return parts[parts.length - 1];
}

function statusBadge(status) {
  const cls = {completed:'badge-completed', submitted:'badge-submitted', running:'badge-running', failed:'badge-failed'}[status] || 'badge-submitted';
  return `<span class="badge ${cls}">${status || 'unknown'}</span>`;
}

function categoryBars(scores) {
  if (!scores?.categoryScores) return '';
  return `<div class="cat-scores">${scores.categoryScores.map(c => `
    <div class="cat-bar-row">
      <span class="cat-bar-label">${c.name}</span>
      <div class="cat-bar-track">
        <div class="cat-bar-fill" style="width:${c.score}%;background:${barColor(c.score)}"></div>
      </div>
      <span class="cat-bar-value" style="color:${barColor(c.score)}">${c.score}</span>
    </div>`).join('')}</div>`;
}

function renderCard(review, idx) {
  const scores = review.codeReviewScores;
  const overall = scores?.overall;
  const pass = scores?.pass;
  const hasScore = overall !== undefined && overall !== null;

  return `
    <div class="card" role="button" tabindex="0" aria-label="${repoName(review.repoUrl)} review" data-idx="${idx}">
      <div class="card-header">
        <span class="card-repo">${repoName(review.repoUrl)}</span>
        ${statusBadge(review.status)}
      </div>
      <div class="card-meta">@${review.username || 'unknown'} &middot; ${review.branch || 'main'}</div>
      ${hasScore ? `
        <div class="score-row">
          <span class="score-big ${pass ? 'score-pass' : 'score-fail'}">${overall}</span>
          <div>
            <span class="score-verdict ${pass ? 'verdict-pass' : 'verdict-fail'}">${pass ? 'PASS' : 'FAIL'}</span>
            <div class="score-label">overall score</div>
          </div>
        </div>
        ${categoryBars(scores)}
      ` : `<div style="color:var(--text-dim);font-size:0.85rem;margin-top:8px;">Review ${review.status || 'pending'}...</div>`}
      <div class="card-desc">${review.ideaDescription || ''}</div>
    </div>`;
}

function renderRubrics(rubrics) {
  if (!rubrics.length) return;
  const rubric = rubrics[0];
  const cats = rubric.structuredContent?.categories || [];
  if (!cats.length) return;

  $('#rubric-section').innerHTML = `
    <div class="rubric-banner">
      <h2>${rubric.name?.replace(/_/g, ' ').toUpperCase() || 'Judging Rubric'} (threshold: ${rubric.structuredContent?.passingThreshold || '?'}%)</h2>
      <div class="rubric-categories">
        ${cats.map(c => `
          <div class="rubric-cat">
            <div class="rubric-cat-name">${c.name}</div>
            <div class="rubric-cat-weight">Weight: ${(c.weight * 100).toFixed(0)}%</div>
            <div class="rubric-cat-desc">${c.description}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function parseIdeaScores(review) {
  if (!review.ideaReviewResult) return null;
  try {
    return typeof review.ideaReviewResult === 'string'
      ? JSON.parse(review.ideaReviewResult)
      : review.ideaReviewResult;
  } catch { return null; }
}

function renderModal(review) {
  const scores = review.codeReviewScores;
  const idea = parseIdeaScores(review);
  const overall = scores?.overall;
  const pass = scores?.pass;
  const hasScore = overall !== undefined && overall !== null;
  const rubricCats = review.rubricUsed?.categories || [];

  const md = (text) => text ? marked.parse(text) : '<em>Not available</em>';

  let html = `
    <button class="modal-close" id="modal-close-btn" aria-label="Close modal">&times;</button>
    <h2>${repoName(review.repoUrl)}</h2>
    <a class="modal-repo-link" href="${review.repoUrl}" target="_blank">${review.repoUrl}</a>

    <div class="modal-section">
      <h3>Project Info</h3>
      <div class="info-grid">
        <span class="info-label">Branch</span><span>${review.branch || 'main'}</span>
        <span class="info-label">Submitter</span><span>@${review.username || 'unknown'}</span>
        <span class="info-label">Status</span><span>${statusBadge(review.status)}</span>
        <span class="info-label">Submitted</span><span>${review.createdAt || '—'}</span>
        <span class="info-label">Updated</span><span>${review.updatedAt || '—'}</span>
      </div>
    </div>

    <div class="modal-section">
      <h3>Idea Description</h3>
      <p style="font-size:0.85rem;">${review.ideaDescription || '—'}</p>
      ${review.hackathonContext ? `<p style="font-size:0.82rem;color:var(--text-dim);margin-top:8px;">${review.hackathonContext}</p>` : ''}
    </div>`;

  if (rubricCats.length) {
    html += `
    <div class="modal-section">
      <h3>Rubric Used</h3>
      <div class="rubric-categories">
        ${rubricCats.map(c => `
          <div class="rubric-cat">
            <div class="rubric-cat-name">${c.name} (${(c.weight * 100).toFixed(0)}%)</div>
            <div class="rubric-cat-desc">${c.criteria?.join(', ') || ''}</div>
          </div>`).join('')}
      </div>
      <p style="font-size:0.8rem;color:var(--text-dim);margin-top:8px;">Passing threshold: ${review.rubricUsed?.passingThreshold || '?'}%</p>
    </div>`;
  }

  if (hasScore || idea) {
    html += `<div class="modal-section"><h3>Scores</h3><div class="scores-grid">`;
    if (hasScore) {
      html += `
        <div class="score-card">
          <h4>Code Review</h4>
          <div class="score-row">
            <span class="score-big ${pass ? 'score-pass' : 'score-fail'}">${overall}</span>
            <span class="score-verdict ${pass ? 'verdict-pass' : 'verdict-fail'}">${pass ? 'PASS' : 'FAIL'}</span>
          </div>
          ${categoryBars(scores)}
        </div>`;
    }
    if (idea) {
      const ideaPass = idea.overallIdeaScore >= (review.rubricUsed?.passingThreshold || 60);
      html += `
        <div class="score-card">
          <h4>Idea Review</h4>
          <div class="score-row">
            <span class="score-big ${ideaPass ? 'score-pass' : 'score-fail'}">${idea.overallIdeaScore}</span>
            <span class="score-verdict ${ideaPass ? 'verdict-pass' : 'verdict-fail'}">${ideaPass ? 'PASS' : 'FAIL'}</span>
          </div>
          <div class="cat-scores">
            ${(idea.categoryScores || []).map(c => `
              <div class="cat-bar-row">
                <span class="cat-bar-label">${c.category}</span>
                <div class="cat-bar-track">
                  <div class="cat-bar-fill" style="width:${c.score}%;background:${barColor(c.score)}"></div>
                </div>
                <span class="cat-bar-value" style="color:${barColor(c.score)}">${c.score}</span>
              </div>`).join('')}
          </div>
        </div>`;
    }
    html += `</div></div>`;
  }

  if (review.combinedSummary || review.codeReviewResult) {
    html += `
    <div class="modal-section">
      <h3>Full Review</h3>
      <div class="tab-bar">
        ${review.combinedSummary ? '<button class="tab-btn active" data-tab="summary">Combined Summary</button>' : ''}
        ${review.codeReviewResult ? `<button class="tab-btn ${review.combinedSummary ? '' : 'active'}" data-tab="code-review">Code Review</button>` : ''}
      </div>
      ${review.combinedSummary ? `<div class="tab-panel active md-content" data-tab="summary">${md(review.combinedSummary)}</div>` : ''}
      ${review.codeReviewResult ? `<div class="tab-panel ${review.combinedSummary ? '' : 'active'} md-content" data-tab="code-review">${md(review.codeReviewResult)}</div>` : ''}
    </div>`;
  }

  if (idea?.strengths || idea?.weaknesses) {
    html += `
    <div class="modal-section">
      <h3>Idea Strengths & Weaknesses</h3>
      <div class="scores-grid">
        ${idea.strengths?.length ? `<div class="score-card"><h4 style="color:var(--green)">Strengths</h4><ul style="font-size:0.82rem;padding-left:16px;">${idea.strengths.map(s => `<li>${s}</li>`).join('')}</ul></div>` : ''}
        ${idea.weaknesses?.length ? `<div class="score-card"><h4 style="color:var(--red)">Weaknesses</h4><ul style="font-size:0.82rem;padding-left:16px;">${idea.weaknesses.map(w => `<li>${w}</li>`).join('')}</ul></div>` : ''}
      </div>
      ${idea.alignmentNotes ? `<p style="font-size:0.82rem;color:var(--text-dim);margin-top:12px;"><strong>Idea-Code Alignment (${idea.ideaCodeAlignment}/100):</strong> ${idea.alignmentNotes}</p>` : ''}
    </div>`;
  }

  return html;
}

function openModal(idx) {
  const review = reviews[idx];
  if (!review) return;
  $('#modal-content').innerHTML = renderModal(review);
  $('#modal-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';

  $('#modal-close-btn').onclick = closeModal;
  $$('.tab-btn', $('#modal-content')).forEach(btn => {
    btn.onclick = () => {
      const tab = btn.dataset.tab;
      $$('.tab-btn', $('#modal-content')).forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      $$('.tab-panel', $('#modal-content')).forEach(p => p.classList.toggle('active', p.dataset.tab === tab));
    };
  });
}

function closeModal() {
  $('#modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

$('#modal-overlay').addEventListener('click', (e) => {
  if (e.target === $('#modal-overlay')) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

async function init() {
  try {
    const [reviewsRes, rubricsRes] = await Promise.all([
      fetch('/api/reviews'),
      fetch('/api/rubrics'),
    ]);
    reviews = await reviewsRes.json();
    rubrics = await rubricsRes.json();

    renderRubrics(rubrics);

    $('#loading').style.display = 'none';
    $('#card-grid').innerHTML = reviews.map(renderCard).join('');

    $$('.card').forEach(card => {
      card.addEventListener('click', () => openModal(+card.dataset.idx));
    });
  } catch (err) {
    $('#loading').innerHTML = `<div style="color:var(--red)">Failed to load: ${err.message}</div>`;
  }
}

init();
</script>
</body>
</html>
