<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthesis Feed</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2a;
      --text: #e0e0e8;
      --text-muted: #8888a0;
      --accent: #ff6b35;
      --accent-dim: #ff6b3520;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      padding: 2rem 1.5rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .header h1 span { color: var(--accent); }
    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }
    select, button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
    }
    select:focus, button:focus { outline: 1px solid var(--accent); }
    button:hover { border-color: var(--accent); }
    .auto-refresh {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .auto-refresh input { accent-color: var(--accent); }
    .grid {
      max-width: 1200px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .card:hover { border-color: var(--accent); }
    .card-banner {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: var(--border);
    }
    .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-summary {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      margin-top: auto;
    }
    .card-author { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-stats { display: flex; gap: 0.75rem; }
    .stat { display: flex; align-items: center; gap: 0.2rem; }
    .load-more-wrap {
      text-align: center;
      padding: 2rem;
    }
    #load-more {
      padding: 0.6rem 2rem;
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 500;
    }
    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      font-size: 1rem;
    }
    .spinner {
      display: none;
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }
    .spinner.active { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>Synthesis</span> Feed</h1>
    <div class="controls">
      <select id="track-filter">
        <option value="">All Tracks</option>
      </select>
      <button id="refresh-btn">Refresh</button>
      <label class="auto-refresh">
        <input type="checkbox" id="auto-refresh-toggle"> Auto-refresh (60s)
      </label>
    </div>
  </div>

  <div class="grid" id="card-grid"></div>
  <div class="spinner" id="spinner">Loading...</div>
  <div class="empty" id="empty" style="display:none">No hyperblogs found.</div>
  <div class="load-more-wrap">
    <button id="load-more" style="display:none">Load More</button>
  </div>

<script>
// === Configuration ===
const API_BASE = "/api";  // Proxied through local server.py
const HYPERBLOG_APP_URL = "https://app.bonfires.ai/hyperblog";
const PAGE_SIZE = 20;

let currentOffset = 0;
let currentBonfireId = "";
let autoRefreshTimer = null;

// === DOM refs ===
const grid = document.getElementById("card-grid");
const spinner = document.getElementById("spinner");
const empty = document.getElementById("empty");
const loadMoreBtn = document.getElementById("load-more");
const trackFilter = document.getElementById("track-filter");
const refreshBtn = document.getElementById("refresh-btn");
const autoRefreshToggle = document.getElementById("auto-refresh-toggle");

// === API ===

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadBonfires() {
  try {
    const bonfires = await fetchJSON(`${API_BASE}/bonfires/list`);
    bonfires.forEach(bf => {
      const opt = document.createElement("option");
      opt.value = bf.id;
      opt.textContent = bf.name;
      trackFilter.appendChild(opt);
    });
  } catch (e) {
    console.error("Failed to load bonfires:", e);
  }
}

async function loadHyperblogs(append = false) {
  if (!append) {
    currentOffset = 0;
    grid.innerHTML = "";
  }
  spinner.classList.add("active");
  empty.style.display = "none";
  loadMoreBtn.style.display = "none";

  try {
    let url = `${API_BASE}/datarooms/hyperblogs?status=completed&limit=${PAGE_SIZE}&offset=${currentOffset}`;
    if (currentBonfireId) url += `&bonfire_id=${currentBonfireId}`;
    const data = await fetchJSON(url);
    const blogs = data.hyperblogs || [];

    if (blogs.length === 0 && currentOffset === 0) {
      empty.style.display = "block";
    }

    blogs.forEach(blog => grid.appendChild(createCard(blog)));
    currentOffset += blogs.length;

    if (blogs.length >= PAGE_SIZE) {
      loadMoreBtn.style.display = "inline-block";
    }
  } catch (e) {
    console.error("Failed to load hyperblogs:", e);
    if (currentOffset === 0) empty.style.display = "block";
  } finally {
    spinner.classList.remove("active");
  }
}

// === Rendering ===

function createCard(blog) {
  const card = document.createElement("a");
  card.className = "card";
  card.href = `${HYPERBLOG_APP_URL}/${blog.id || ""}`;
  card.target = "_blank";
  card.rel = "noopener";

  const bannerUrl = blog.banner_url || blog.bannerUrl || "";
  const title = blog.user_query || blog.userQuery || "Untitled";
  const summary = blog.summary || (blog.blog_content || "").slice(0, 200);
  const author = blog.author_wallet || blog.authorWallet || "unknown";
  const authorDisplay = author.length > 12 ? author.slice(0, 6) + "..." + author.slice(-4) : author;
  const upvotes = blog.upvotes ?? blog.upvote_count ?? 0;
  const views = blog.views ?? blog.view_count ?? 0;
  const comments = blog.comment_count ?? 0;
  const createdAt = blog.created_at || blog.createdAt || "";
  const dateStr = createdAt ? new Date(createdAt).toLocaleDateString() : "";

  card.innerHTML = `
    ${bannerUrl ? `<img class="card-banner" src="${bannerUrl}" alt="" loading="lazy" onerror="this.style.display='none'">` : ""}
    <div class="card-body">
      <div class="card-title">${escapeHtml(title)}</div>
      <div class="card-summary">${escapeHtml(summary)}</div>
      <div class="card-meta">
        <span class="card-author" title="${escapeHtml(author)}">${escapeHtml(authorDisplay)} &middot; ${dateStr}</span>
        <div class="card-stats">
          <span class="stat">&uarr; ${upvotes}</span>
          <span class="stat">&#128065; ${views}</span>
          <span class="stat">&#128172; ${comments}</span>
        </div>
      </div>
    </div>
  `;
  return card;
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

// === Events ===

trackFilter.addEventListener("change", () => {
  currentBonfireId = trackFilter.value;
  loadHyperblogs();
});

refreshBtn.addEventListener("click", () => loadHyperblogs());
loadMoreBtn.addEventListener("click", () => loadHyperblogs(true));

autoRefreshToggle.addEventListener("change", () => {
  if (autoRefreshToggle.checked) {
    autoRefreshTimer = setInterval(() => loadHyperblogs(), 60000);
  } else {
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = null;
  }
});

// === Init ===
loadBonfires();
loadHyperblogs();
</script>
</body>
</html>
